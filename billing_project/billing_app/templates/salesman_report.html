{% extends 'base.html' %}
{% block content %}

<div class="container">

    <h3 class="fw-bold mb-4">📊 Salesman Report</h3>

    <div class="row">

        {% for d in data %}
        <div class="col-md-3 mb-3">
            <div class="card shadow-sm text-center p-3 border-0">

                <i class="fas fa-user-check fa-2x text-success mb-2"></i>

                <h5>{{ d.salesman__user__username }}</h5>
                <p class="text-muted">Total Visits</p>

                <h4 class="fw-bold text-primary">{{ d.total }}</h4>

            </div>
        </div>
        {% empty %}
        <p class="text-muted">No Data Available</p>
        {% endfor %}

    </div>

</div>

{% endblock %}
