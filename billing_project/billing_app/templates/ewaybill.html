{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <h2 class="mb-4 fw-bold">🚚 E-Way Bill</h2>

    <div class="card shadow-lg border-0">

        <div class="card-header bg-warning text-dark d-flex justify-content-between">
            <span><b>Invoice #{{ data.invoice_no }}</b></span>
            <span>E-Way Bill</span>
        </div>

        <div class="card-body">

            <div class="row mb-3">
                <div class="col-md-6">
                    <p><b>From:</b></p>
                    <div class="border rounded p-2 bg-light">
                        {{ data.from_location }}
                    </div>
                </div>

                <div class="col-md-6">
                    <p><b>To:</b></p>
                    <div class="border rounded p-2 bg-light">
                        {{ data.to }}
                    </div>
                </div>
            </div>

            <hr>

            <div class="row text-center">

                <div class="col-md-4 mb-3">
                    <div class="p-3 border rounded shadow-sm">
                        <h6 class="text-muted">🚛 Vehicle No</h6>
                        <h5 class="fw-bold">{{ data.vehicle_no }}</h5>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="p-3 border rounded shadow-sm">
                        <h6 class="text-muted">📍 Distance</h6>
                        <h5 class="fw-bold">{{ data.distance }}</h5>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="p-3 border rounded shadow-sm bg-light">
                        <h6 class="text-muted">💰 Total Amount</h6>
                        <h5 class="fw-bold text-success">₹{{ data.total }}</h5>
                    </div>
                </div>

            </div>

        </div>

        <div class="card-footer text-center">

            <a href="{% url 'invoice_view' data.invoice_no %}" 
               class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back
            </a>

            <button onclick="window.print()" class="btn btn-success">
                <i class="fas fa-print"></i> Print
            </button>

        </div>

    </div>

</div>

{% endblock %}
