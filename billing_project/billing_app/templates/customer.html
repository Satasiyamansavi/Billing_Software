{% extends 'base.html' %}

{% block content %}

<h3>{% if customer_to_edit %}Edit{% else %}Add{% endif %} Customer</h3>

<form method="post" class="card p-3 mb-4 shadow">
    {% csrf_token %}
    <input type="hidden" name="customer_id" value="{{ customer_to_edit.id|default:'' }}">

    <input type="text" name="name" placeholder="Name" class="form-control mb-2"
           value="{{ customer_to_edit.name|default:'' }}" required>
    <input type="text" name="phone" placeholder="Phone" class="form-control mb-2"
           value="{{ customer_to_edit.phone|default:'' }}" required>
    <input type="text" name="address" placeholder="Address" class="form-control mb-2"
           value="{{ customer_to_edit.address|default:'' }}" required>

    <button class="btn {% if customer_to_edit %}btn-primary{% else %}btn btn-primary{% endif %}">
        {% if customer_to_edit %}Update{% else %}Add{% endif %} Customer
    </button>
</form>

<h3>Customer List</h3>

<table class="table table-bordered table-striped shadow">
<tr>
    <th>Name</th>
    <th>Phone</th>
    <th>Address</th>
    <th>Action</th>
</tr>

{% for c in data %}
<tr>
    <td>{{ c.name }}</td>
    <td>{{ c.phone }}</td>
    <td>{{ c.address }}</td>
    <td>

    <a href="?edit={{ c.id }}" 
       class="btn btn-sm btn-outline-primary me-1" 
       title="Edit">
        <i class="fas fa-edit"></i>
    </a>

    <a href="/delete_customer/{{ c.id }}" 
       class="btn btn-sm btn-outline-danger"
       title="Delete"
       onclick="return confirm('Are you sure you want to delete this customer?');">
        <i class="fas fa-trash"></i>
    </a>

    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
