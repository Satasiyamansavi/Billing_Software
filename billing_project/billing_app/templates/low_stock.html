{% extends 'base.html' %}
{% block content %}

<h3 class="mb-3">⚠️ Low Stock Items</h3>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>Product</th>
            <th>Brand</th>
            <th>Stock</th>
            <th>Limit</th>
        </tr>
    </thead>

    <tbody>
    {% for item in items %}
    <tr>
        <td>{{ item.parent.name }}<br><small class="text-muted">↳ {{ item.name }}</small></td>
        <td>{{ item.brand.name }}</td>
        <td class="{% if item.stock < item.low_stock_limit %}text-danger fw-bold{% endif %}">{{ item.stock }}</td>
        <td>{{ item.low_stock_limit }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="6" class="text-center">No low stock items</td>
    </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
