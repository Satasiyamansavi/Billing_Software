<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #a8c0ff, #3f2b96); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <form method="post" class="bg-white p-5 rounded-lg shadow-lg">
                {% csrf_token %}
                <h3 class="text-center mb-4 text-secondary">Login</h3>

                <input name="username" class="form-control mb-3" placeholder="Username">
                <input type="password" name="password" class="form-control mb-4" placeholder="Password">

                <button class="btn btn-dark w-100 py-2">Login</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
