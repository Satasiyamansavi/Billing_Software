{% extends 'base.html' %}
{% block content %}

<h3>📊 Sales Chart</h3>

<canvas id="salesChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('salesChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ labels|safe }},
        datasets: [{
            label: 'Daily Sales',
            data: {{ totals|safe }},
            borderWidth: 2
        }]
    }
});
</script>

{% endblock %}
