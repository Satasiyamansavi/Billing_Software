{% extends 'base.html' %}
{% block content %}

<h3>Owner Dashboard</h3>

<div class="row">

<div class="col-md-4">
    <div class="card p-3 bg-success text-white">
        <h5>Total Sales</h5>
        <h3>₹{{ sales | floatformat:2}}</h3>
    </div>
</div>

<div class="col-md-4">
    <div class="card p-3 bg-primary text-white">
        <h5>Total Stock</h5>
        <h3>{{ stock }}</h3>
    </div>
</div>

<div class="col-md-4">
    <div class="card p-3 bg-warning text-dark">
        <h5>Total Customers</h5>
        <h3>{{ customers }}</h3>
    </div>
</div>

</div>

{% endblock %}
