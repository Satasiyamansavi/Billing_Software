{% extends 'base.html' %}
{% block content %}

<div class="container">

    <h3 class="fw-bold mb-4">📍 Visit Management</h3>

    <div class="card shadow border-0 mb-4">
        <div class="card-body">

            <h5 class="mb-3">➕ Add Visit</h5>

            <form method="post" class="row g-2">
                {% csrf_token %}

                <div class="col-md-4">
                    <label>Salesman</label>
                    <select name="salesman" class="form-control" required>
                        <option value="">Select Salesman</option>
                        {% for s in salesmen %}
                            <option value="{{ s.id }}">{{ s.user.username }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Customer</label>
                    <select name="customer" class="form-control" required>
                        <option value="">Select Customer</option>
                        {% for c in customers %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Notes</label>
                    <input type="text" name="notes" 
                           class="form-control" 
                           placeholder="Visit Notes">
                </div>

                <div class="col-12">
                    <button class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Visit
                    </button>
                </div>

            </form>

        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <input type="text" id="search" class="form-control" placeholder="Search Customer / Salesman...">
        </div>
    </div>

    <div class="card shadow border-0">
        <div class="card-body p-0">

            <table class="table table-hover mb-0" id="table">
                <thead class="table-dark">
                    <tr>
                        <th>Salesman</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Notes</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    {% for v in data %}
                    <tr>

                        <td>{{ v.salesman.user.username }}</td>
                        <td>{{ v.customer.name }}</td>
                        <td>{{ v.date }}</td>
                        <td>{{ v.notes }}</td>

                        <td>
                            <span class="badge bg-success">Visited</span>
                        </td>

                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="text-center text-muted p-3">
                            No Visits Found
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

<script>
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("#table tbody tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(value) ? "" : "none";
    });
});
</script>

{% endblock %}
