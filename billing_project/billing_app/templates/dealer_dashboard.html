{% extends 'base.html' %}
{% block content %}

<div class="container">

    <h2 class="mb-4 fw-bold">🛒 Dealer Dashboard</h2>

    <form method="post" action="/dealer/place-order/">
        {% csrf_token %}

        <div class="row">
            {% for p in products %}
            <div class="col-md-4 col-sm-6 mb-4">
                <div class="card shadow border-0 h-100">

                    <div class="card-body">

                        <h5 class="fw-bold">{{ p.name }}</h5>

                        <p class="text-success fw-bold mb-1">
                            ₹{{ p.price }}
                        </p>

                        <p class="mb-2">
                            Stock:
                            {% if p.stock > 10 %}
                                <span class="badge bg-success">{{ p.stock }}</span>
                            {% elif p.stock > 0 %}
                                <span class="badge bg-warning text-dark">{{ p.stock }}</span>
                            {% else %}
                                <span class="badge bg-danger">Out of Stock</span>
                            {% endif %}
                        </p>

                        <div class="form-check mb-2">
                            <input class="form-check-input product-check"
                                   type="checkbox"
                                   name="select_{{ p.id }}"
                                   id="p{{ p.id }}"
                                   onclick="toggleQty({{ p.id }})">

                            <label class="form-check-label fw-semibold" for="p{{ p.id }}">
                                Select Product
                            </label>
                        </div>

                        <input type="number"
                               name="qty_{{ p.id }}"
                               id="qty_{{ p.id }}"
                               class="form-control"
                               placeholder="Enter Qty"
                               min="1"
                               disabled>

                    </div>

                </div>
            </div>
            {% endfor %}
        </div>

        <div class="text-end mt-3">
            <button type="submit" class="btn btn-primary px-4">
                <i class="fas fa-cart-plus"></i> Place Order
            </button>
        </div>

    </form>

</div>

<script>
function toggleQty(id) {
    let checkbox = document.getElementById('p' + id);
    let qtyInput = document.getElementById('qty_' + id);

    if (checkbox.checked) {
        qtyInput.disabled = false;
        qtyInput.focus();
    } else {
        qtyInput.disabled = true;
        qtyInput.value = '';
    }
}
</script>

{% endblock %}
